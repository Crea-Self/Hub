<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Distance de Vision Optimale Interactive</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f7f9fc;
      margin: 0;
      padding: 20px;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      margin-bottom: 5px;
      color: #004d40;
      text-align: center;
    }
    p.subtitle {
      margin: 0 0 20px 0;
      color: #555;
      font-size: 14px;
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
    }
    select, input[type="number"] {
      margin-top: 5px;
      padding: 10px;
      font-size: 16px;
      width: 100%;       
      max-width: 250px;  
      border-radius: 5px;
      border: 1.8px solid #004d40;
      outline-offset: 2px;
      outline-color: #80cbc4;
      transition: outline-color 0.3s ease;
      box-sizing: border-box; 
    }
    select:focus, input[type="number"]:focus {
      outline-color: #26a69a;
    }
    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      padding: 30px 40px;
      max-width: 550px;
      width: 90%;
      margin-top: 10px;
    }
    ul {
      margin-top: 20px;
      list-style: none;
      padding-left: 0;
      max-height: 350px;
      overflow-y: auto;
      border-top: 2px solid #004d40;
    }
    li {
      padding: 12px 10px;
      border-bottom: 1px solid #eee;
      font-size: 16px;
      color: #00695c;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s ease;
    }
    li.recommended {
      background: #e0f2f1;
      font-weight: 700;
      color: #004d40;
      border-left: 5px solid #00796b;
    }
    .message {
      margin-top: 15px;
      font-size: 15px;
      font-style: italic;
      color: #00796b;
      min-height: 1.3em;
      line-height: 1.4;
    }
    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      li {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

  <h1>Distance de Vision Optimale</h1>
  <p class="subtitle">Moniteurs PC & Écrans TV (Calculé selon les standards THX/SMPTE)</p>

  <div class="container">
    <label for="resolution">Choisis ta résolution :</label>
    <select id="resolution" onchange="updateList()">
      <option value="1080p">1080p (Full HD)</option>
      <option value="1440p">1440p (QHD / 2K)</option>
      <option value="4K">4K (Ultra HD)</option>
      <option value="8K">8K (Ultra HD High-Res)</option>
    </select>

    <label for="distance">Ta distance actuelle (en mètres) :</label>
    <input
      type="number"
      id="distance"
      min="0.1"
      step="0.01"
      placeholder="Ex : 1.5 ou 2.5"
      oninput="updateList()"
      aria-label="Distance en mètres"
    />

    <div class="message" id="message"></div>

    <ul id="distanceList" aria-live="polite" aria-atomic="true"></ul>
  </div>

<script>
  // Base de données étendue (Taille en pouces: [Distance Min, Distance Max])
  const data = {
    "1080p": {
      "24\"": [1.0, 1.5],
      "27\"": [1.1, 1.7],
      "32\"": [1.3, 2.0],
      "40\"": [1.6, 2.5],
      "43\"": [1.7, 2.7],
      "50\"": [2.0, 3.1],
      "55\"": [2.2, 3.4],
      "65\"": [2.6, 4.0],
      "75\"": [3.0, 4.7],
      "85\"": [3.4, 5.3]
    },
    "1440p": {
      "24\"": [0.7, 1.1],
      "27\"": [0.8, 1.3],
      "32\"": [1.0, 1.5],
      "40\"": [1.2, 1.9],
      "43\"": [1.3, 2.0],
      "50\"": [1.5, 2.4],
      "55\"": [1.7, 2.6],
      "65\"": [2.0, 3.1],
      "75\"": [2.3, 3.6],
      "85\"": [2.6, 4.0]
    },
    "4K": {
      "24\"": [0.5, 0.8],
      "27\"": [0.6, 0.9],
      "32\"": [0.7, 1.1],
      "40\"": [0.8, 1.4],
      "43\"": [0.9, 1.5],
      "50\"": [1.0, 1.7],
      "55\"": [1.2, 1.9],
      "65\"": [1.4, 2.3],
      "75\"": [1.6, 2.6],
      "85\"": [1.8, 3.0]
    },
    "8K": {
      "24\"": [0.3, 0.5],
      "27\"": [0.3, 0.6],
      "32\"": [0.4, 0.7],
      "40\"": [0.5, 0.9],
      "43\"": [0.5, 1.0],
      "50\"": [0.6, 1.1],
      "55\"": [0.7, 1.3],
      "65\"": [0.8, 1.5],
      "75\"": [0.9, 1.7],
      "85\"": [1.0, 2.0]
    }
  };

  function updateList() {
    const resolution = document.getElementById("resolution").value;
    const distanceInput = document.getElementById("distance").value.trim();
    const list = document.getElementById("distanceList");
    const message = document.getElementById("message");

    list.innerHTML = "";
    message.textContent = "";

    if (!distanceInput || isNaN(distanceInput) || distanceInput <= 0) {
      message.textContent = "Saisis ta distance pour voir le recul conseillé par taille d’écran.";
      showAll(resolution);
      return;
    }

    const dist = parseFloat(distanceInput);
    const sizes = Object.entries(data[resolution]);
    let foundSuitable = false;

    // Tri numérique par taille d'écran (pour éviter les bugs de tri alphabétique)
    sizes.sort((a,b) => parseInt(a[0]) - parseInt(b[0]));

    sizes.forEach(([size, [minDist, maxDist]]) => {
      const li = document.createElement("li");
      li.textContent = `${size} ➜ ${minDist.toFixed(1)} m – ${maxDist.toFixed(1)} m`;
      
      if (dist >= minDist && dist <= maxDist) {
        li.classList.add("recommended");
        foundSuitable = true;
      }
      list.appendChild(li);
    });

    if (foundSuitable) {
      message.textContent = `À ${dist.toFixed(2)} m de distance, les tailles d'écran surlignées en vert sont idéales.`;
    } else {
      let closest = sizes.reduce((acc, [size, [minD, maxD]]) => {
        let distToRange = 0;
        if (dist < minD) distToRange = minD - dist;
        else if (dist > maxD) distToRange = dist - maxD;
        return distToRange < acc.dist ? { size, dist: distToRange } : acc;
      }, { size: null, dist: Infinity });

      message.textContent = `Ta distance (${dist.toFixed(2)} m) est atypique pour cette résolution. L'écran le plus proche de tes besoins serait un ${closest.size}.`;
    }
  }

  function showAll(resolution) {
    const list = document.getElementById("distanceList");
    list.innerHTML = "";
    const sizes = Object.entries(data[resolution]);

    sizes.sort((a,b) => parseInt(a[0]) - parseInt(b[0]));

    sizes.forEach(([size, [minDist, maxDist]]) => {
      const li = document.createElement("li");
      li.textContent = `${size} ➜ ${minDist.toFixed(1)} m – ${maxDist.toFixed(1)} m`;
      list.appendChild(li);
    });
  }

  window.onload = updateList;
</script>

</body>
</html>
