<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Distance de Vision Optimale Interactive</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f7f9fc;
      margin: 0;
      padding: 20px;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      margin-bottom: 10px;
      color: #004d40;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
    }
    select, input[type="number"] {
      margin-top: 5px;
      padding: 10px;
      font-size: 16px;
      width: 100%;       /* <-- largeur adaptative */
      max-width: 200px;  /* <-- limite la largeur */
      border-radius: 5px;
      border: 1.8px solid #004d40;
      outline-offset: 2px;
      outline-color: #80cbc4;
      transition: outline-color 0.3s ease;
      box-sizing: border-box; /* important */
    }
    select:focus, input[type="number"]:focus {
      outline-color: #26a69a;
    }
    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      padding: 30px 40px;
      max-width: 500px;
      width: 90%;
      margin-top: 20px;
    }
    ul {
      margin-top: 20px;
      list-style: none;
      padding-left: 0;
      max-height: 250px;
      overflow-y: auto;
      border-top: 2px solid #004d40;
    }
    li {
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      font-size: 18px;
      color: #00695c;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    li.recommended {
      background: #e0f2f1;
      font-weight: 700;
      color: #004d40;
      border-left: 5px solid #00796b;
    }
    .message {
      margin-top: 15px;
      font-size: 16px;
      font-style: italic;
      color: #00796b;
      min-height: 1.3em;
    }
    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }
      li {
        font-size: 16px;
      }
      /* width 100% déjà géré */
    }
  </style>
</head>
<body>

  <h1>Distance de Vision Optimale</h1>
  <div class="container">
    <label for="resolution">Choisis ta résolution :</label>
    <select id="resolution" onchange="updateList()">
      <option value="1080p">1080p (Full HD)</option>
      <option value="1440p">1440p (QHD)</option>
      <option value="4K">4K (Ultra HD)</option>
      <option value="8K">8K</option>
    </select>

    <label for="distance">Ta distance actuelle (en mètres) :</label>
    <input
      type="number"
      id="distance"
      min="0.1"
      step="0.01"
      placeholder="Ex : 2.0"
      oninput="updateList()"
      aria-label="Distance en mètres"
    />

    <div class="message" id="message"></div>

    <ul id="distanceList" aria-live="polite" aria-atomic="true"></ul>
  </div>

<script>
  const data = {
    "1080p": {
      "32\"": [1.3, 2.0],
      "40\"": [1.6, 2.4],
      "50\"": [2.0, 2.5],
      "60\"": [2.4, 3.0],
      "75\"": [3.0, 3.8]
    },
    "1440p": {
      "32\"": [1.0, 1.5],
      "40\"": [1.2, 1.8],
      "50\"": [1.5, 2.1],
      "60\"": [1.8, 2.4],
      "75\"": [2.2, 3.0]
    },
    "4K": {
      "32\"": [0.7, 1.3],
      "40\"": [0.9, 1.6],
      "50\"": [1.0, 1.9],
      "60\"": [1.2, 2.3],
      "75\"": [1.5, 2.9]
    },
    "8K": {
      "32\"": [0.4, 1.0],
      "40\"": [0.5, 1.2],
      "50\"": [0.6, 1.5],
      "60\"": [0.7, 1.8],
      "75\"": [0.9, 2.3]
    }
  };

  function updateList() {
    const resolution = document.getElementById("resolution").value;
    const distanceInput = document.getElementById("distance").value.trim();
    const list = document.getElementById("distanceList");
    const message = document.getElementById("message");

    list.innerHTML = "";
    message.textContent = "";

    if (!distanceInput || isNaN(distanceInput) || distanceInput <= 0) {
      message.textContent = "Saisis ta distance pour voir les tailles d’écran adaptées.";
      showAll(resolution);
      return;
    }

    const dist = parseFloat(distanceInput);

    const sizes = Object.entries(data[resolution]);
    let foundSuitable = false;

    sizes.sort((a,b) => parseInt(a[0]) - parseInt(b[0]));

    sizes.forEach(([size, [minDist, maxDist]]) => {
      const li = document.createElement("li");
      li.textContent = `${size} ➜ ${minDist.toFixed(1)} – ${maxDist.toFixed(1)} m`;
      if (dist >= minDist && dist <= maxDist) {
        li.classList.add("recommended");
        foundSuitable = true;
      }
      list.appendChild(li);
    });

    if (foundSuitable) {
      message.textContent = `Ta distance (${dist.toFixed(2)} m) correspond aux tailles surlignées.`;
    } else {
      let closest = sizes.reduce((acc, [size, [minD, maxD]]) => {
        let distToRange = 0;
        if (dist < minD) distToRange = minD - dist;
        else if (dist > maxD) distToRange = dist - maxD;
        else distToRange = 0;
        return distToRange < acc.dist ? { size, dist: distToRange } : acc;
      }, { size: null, dist: Infinity });

      message.textContent = `Ta distance (${dist.toFixed(2)} m) est en dehors des plages habituelles. La taille la plus proche est ${closest.size}.`;
    }
  }

  function showAll(resolution) {
    const list = document.getElementById("distanceList");
    list.innerHTML = "";
    const sizes = Object.entries(data[resolution]);

    sizes.sort((a,b) => parseInt(a[0]) - parseInt(b[0]));

    sizes.forEach(([size, [minDist, maxDist]]) => {
      const li = document.createElement("li");
      li.textContent = `${size} ➜ ${minDist.toFixed(1)} – ${maxDist.toFixed(1)} m`;
      list.appendChild(li);
    });
  }

  window.onload = updateList;
</script>

</body>
</html>
